name: CI - Ticketing Test Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start API with Docker Compose
        run: docker compose up -d api

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          curl -sf http://localhost:8000/health || exit 1

      - name: Install test dependencies
        run: |
          pip install robotframework requests robotframework-requests
          pip install -r requirements.txt

      - name: Run Robot Framework tests
        run: |
          robot --exclude ui --variable API_BASE_URL:http://localhost:8000 --outputdir results tests/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/

  deploy-reports:
    needs: test
    if: always() && needs.test.result != 'cancelled' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: robot-results

      - name: Create index page
        run: |
          REPO="karinehei/public-transport-test-automation-demo"
          cat > index.html << EOF
          <!DOCTYPE html>
          <html>
          <head><title>Robot Framework Test Reports</title></head>
          <body>
            <h1>Robot Framework Test Reports</h1>
            <ul>
              <li><a href="https://htmlpreview.github.io/?https://raw.githubusercontent.com/${REPO}/reports/report.html">Report</a></li>
              <li><a href="https://htmlpreview.github.io/?https://raw.githubusercontent.com/${REPO}/reports/log.html">Log</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Push to reports branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin reports 2>/dev/null || true
          git checkout reports 2>/dev/null || git checkout -b reports
          if ! git rev-parse origin/reports &>/dev/null; then
            git rm -rf . 2>/dev/null || true
          fi
          git add report.html log.html index.html
          git diff --staged --quiet || git commit -m "Update test reports [skip ci]"
          git push origin reports
