# Render Blueprint - Ticketing Demo
# Backend: FastAPI Web Service | Frontend: Vite Static Site

services:
  # FastAPI backend
  - type: web
    name: ticketing-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"

  # Vite/React frontend
  - type: web
    name: ticketing-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://ticketing-api-4qn8.onrender.com
      - key: VITE_REPORTS_URL
        sync: false

  # Robot Framework test reports (from reports branch)
  - type: web
    name: ticketing-reports
    runtime: static
    branch: reports
    buildCommand: "echo 'No build needed'"
    staticPublishPath: .
