services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-serve
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    volumes:
      - .:/workspace
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://api:8000
    command: robot --exclude ui --variable API_BASE_URL:http://api:8000 --outputdir results tests/

  tests-ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    volumes:
      - .:/workspace
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      - API_BASE_URL=http://api:8000
    command: robot --include ui --variable APP_URL:http://frontend --variable API_BASE_URL:http://api:8000 --outputdir results tests/
    profiles:
      - ui-tests
