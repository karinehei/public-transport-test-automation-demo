services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  tests:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    depends_on:
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir robotframework requests robotframework-requests &&
             pip install -r requirements.txt &&
             robot --variable API_BASE_URL:http://api:8000 --outputdir results tests/"
    profiles:
      - test
